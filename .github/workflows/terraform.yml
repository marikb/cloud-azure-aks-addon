name: terraform

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [terraform, governance]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      # No backend/credentials needed — providers install from the committed lock file.
      - name: Init
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate -no-color

      # Tests use mock_provider, so no Azure credentials are required.
      - name: Test
        run: terraform test -no-color
